name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    environment:
      name: production
      url: https://wheelder.com

    steps:
      - name: Deploy to DigitalOcean Droplet
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_KEY }}
          port: 22
          script: |
            echo "Starting deployment to wheelder.com..."
            
            # Navigate to project directory
            cd /var/www/environments/production/wheelder.com || { echo "Directory not found"; exit 1; }
            
            # Stash any local changes (safety measure)
            git stash 2>/dev/null || true
            
            # Fetch latest changes from GitHub
            echo "Fetching latest code from main branch..."
            git fetch origin main
            
            # Pull latest code
            echo "Pulling latest code..."
            git pull origin main || { echo "Git pull failed"; exit 1; }
            
            # Set correct ownership
            echo "Setting file permissions..."
            chown -R www-data:www-data /var/www/environments/production/wheelder.com
            
            # Set correct permissions
            find /var/www/environments/production/wheelder.com -type f -exec chmod 644 {} \;
            find /var/www/environments/production/wheelder.com -type d -exec chmod 755 {} \;
            
            # WHY: SQLite WAL mode needs writable DB files (664) AND writable parent
            # directories (775) so PHP-FPM (www-data) can create -wal and -shm companions.
            # The generic chmod above resets these to 644/755 which blocks writes.
            # Handle both .sqlite and .db extensions (wheelder.db uses .db)
            find /var/www/environments/production/wheelder.com -name "*.sqlite" -exec chmod 664 {} \;
            find /var/www/environments/production/wheelder.com -name "*.sqlite" -exec sh -c 'chmod 775 "$(dirname "$1")"' _ {} \;
            find /var/www/environments/production/wheelder.com -name "*.db" -exec chmod 664 {} \;
            find /var/www/environments/production/wheelder.com -name "*.db" -exec sh -c 'chmod 775 "$(dirname "$1")"' _ {} \;
            
            # WHY: Also ensure WAL/SHM companion files are writable if they exist
            find /var/www/environments/production/wheelder.com -name "*.db-wal" -exec chmod 664 {} \; 2>/dev/null || true
            find /var/www/environments/production/wheelder.com -name "*.db-shm" -exec chmod 664 {} \; 2>/dev/null || true
            
            # Restart Nginx to apply changes
            echo "Restarting Nginx..."
            systemctl reload nginx || systemctl restart nginx
            
            echo "Deployment completed successfully!"
            echo "Site: https://wheelder.com"
